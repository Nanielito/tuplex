name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - hotfix/**

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ 21, 25 ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Build
        run: ./gradlew clean build
